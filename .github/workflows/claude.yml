# Responde a menciones @claude en issues y comentarios de PR.
# Autenticación por suscripción (Pro/Max): genera el token con `claude setup-token`
# y guárdalo como secret CLAUDE_CODE_OAUTH_TOKEN en Settings -> Secrets and variables -> Actions.
# (Alternativa con API key: usar anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }})
name: Claude Code
on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]

jobs:
  claude:
    if: contains(github.event.comment.body || github.event.issue.body, '@claude')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - uses: actions/checkout@v4   # necesario para que use .claude/ y CLAUDE.md del repo
      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # Superpowers se usa solo localmente (ver README). No se instala en CI
          # para evitar riesgo de cadena de suministro (review PR #4).
          # La metodología multiagente consume muchos turnos
          claude_args: "--max-turns 60"
